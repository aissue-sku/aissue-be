# Config ServerΉΩΡ ΉιΒΉγσΈΡαΈΛΦ ΉΕνΉιΧ
spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file://${user.dir}/config-server/config-repo

server:
  port: 8888

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health, info